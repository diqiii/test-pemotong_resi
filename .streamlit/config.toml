[server]
# Naikkan batas ukuran upload dari default 200MB ke 500MB
maxUploadSize = 500

# Nonaktifkan XSRF protection agar upload dari HP tidak di-reject
enableXsrfProtection = false

[browser]
# Matikan gathering usage stats agar koneksi lebih ringan
gatherUsageStats = false

[runner]
# Naikkan timeout magic commands
magicEnabled = true

[client]
# Perpanjang interval heartbeat WebSocket (detik)
# Default: 15 detik — terlalu pendek untuk file picker HP yang lambat
# Dinaikkan ke 120 detik agar koneksi tidak putus saat user milih foto
toolbarMode = "minimal"
